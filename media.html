<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Медиатека экспедиций ABYSS | Фото и видео фридайвинга и подводной охоты</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Фотографии и видео из авторских экспедиций ABYSS: подводный мир, фридайвинг, охота, команда и атмосфера путешествий. Смотрите и вдохновляйтесь.">
    <meta property="og:title" content="Медиатека ABYSS — фото и видео экспедиций">
    <meta property="og:description" content="Яркие моменты подводных приключений: фридайвинг, подводная охота, команда и лучшие локации.">
    <meta property="og:image" content="https://вашсайт.ru/img/og-image.jpg">
    <meta property="og:url" content="https://вашсайт.ru/media.html">
    <meta property="og:type" content="website">

    <!-- Убираем Google Fonts, используем локальные шрифты -->
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet"> -->
    <link rel="stylesheet" href="style.css">

    <!-- ========== ОБЩИЕ СТИЛИ ========== -->
    <style>
        /* Подключаем локальные шрифты */
        @font-face {
            font-family: 'Cormorant Garamond';
            src: url('fonts/CormorantGaramond.ttf') format('truetype');
            font-weight: 500 600;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Inter';
            src: url('fonts/Inter.otf') format('opentype');
            font-weight: 300 400 500 600;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            min-height: 100%;
            touch-action: pan-y pinch-zoom;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif; /* основной шрифт Inter */
            font-size: 16px;
            line-height: 1.5;
            overflow-x: hidden;
            overflow-y: scroll;
        }
        /* Фон (видео / изображение) */
        #parallax-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            transform: translateZ(0);
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            will-change: transform;
        }
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
        }
        .grain {
            position: absolute;
            inset: 0;
            background: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.12;
            pointer-events: none;
        }
        .page {
            position: relative;
            z-index: 2;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 70px 20px;
        }
        .divider {
            height: 1px;
            margin: 20px auto;
        }
        /* Заголовки секций — теперь Cormorant Garamond */
        .section-title {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 44px; /* 40–48px */
            font-weight: 600;
            margin-bottom: 70px;
        }
        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: none;
        }
    </style>
</head>
<body>

<!-- ФОН (ВИДЕО) -->
<div id="parallax-bg">
    <video id="bg-video" autoplay muted loop playsinline preload="auto" poster="img/fon.jpg">
        <source src="video/ocean.mp4" type="video/mp4">
    </video>
    <div class="grain"></div>
    <div class="overlay"></div>
</div>

<div class="page">

<!-- ========== ШАПКА ========== -->
<style>
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .logo {
        font-weight: 500;
        letter-spacing: 0.2em;
        font-family: 'Inter', sans-serif;
    }
    .nav {
        display: flex;
        gap: 40px;
    }
    .nav a {
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.85;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
    }
</style>
<header class="header container">
    <a href="index.html" style="text-decoration: none; color: inherit;"><div class="logo">ABYSS</div></a>
    <nav class="nav">
        <a href="expeditions.html">Экспедиции</a>
        <a href="individual.html">Авторские туры</a>
        <a href="media.html">Фото и Видео</a>
        <a href="contacts.html">Контакты</a>
    </nav>
</header>

<!-- ========== ГЕРОЙ ========== -->
<style>
    .hero {
        min-height: 50vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .hero-inner {
        text-align: center;
    }
    .hero h1 {
        font-family: 'Cormorant Garamond', serif; /* заменяем Playfair */
        font-size: 64px; /* 60–72px */
        font-weight: 600;
        margin-bottom: 10px;
    }
    .hero p {
        font-size: 18px;
        color: #bbb;
        margin-bottom: 20px;
        font-family: 'Inter', sans-serif;
        font-weight: 300;
    }
</style>
<section class="hero">
    <div class="hero-inner">
        <h1>Медиатека</h1>
        <p>Фото и видео из наших экспедиций</p>
    </div>
</section>

<div class="divider"></div>

<!-- ========== ГАЛЕРЕЯ ========== -->
<style>
    .gallery {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }
    .gallery img {
        width: 100%;
        height: 160px;
        object-fit: cover;
    }
</style>
<section class="container reveal">
    <h2 class="section-title">Фотографии</h2>
    <div class="gallery">
        <img src="img/gallery/g1.jpg" alt="Фридайвер под водой с дельфинами" loading="lazy">
        <img src="img/gallery/g2.jpg" alt="Подводная охота, охотник с рыбой" loading="lazy">
        <img src="img/gallery/g3.jpg" alt="Команда ABYSS на закате у океана" loading="lazy">
        <img src="img/gallery/g4.jpg" alt="Коралловый риф и дайверы" loading="lazy">
        <img src="img/gallery/g1.jpg" alt="Фридайвинг в океане, девушка и дельфины" loading="lazy">
        <img src="img/gallery/g2.jpg" alt="Подводный охотник с трофеем" loading="lazy">
        <img src="img/gallery/g3.jpg" alt="Группа на фоне заката после погружения" loading="lazy">
        <img src="img/gallery/g4.jpg" alt="Разноцветные рыбы на коралловом рифе" loading="lazy">
    </div>
</section>

<div class="divider"></div>

<!-- ========== ВИДЕО-СЕКЦИЯ ========== -->
<style>
    .video-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
    }
    .video-placeholder {
        background: #1a1a1a;
        aspect-ratio: 16/9;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #888;
        font-family: 'Inter', sans-serif; /* для единообразия */
    }
</style>
<section class="container reveal">
    <h2 class="section-title">Видео</h2>
    <div class="video-grid">
        <div class="video-placeholder">video placeholder</div>
        <div class="video-placeholder">video placeholder</div>
        <div class="video-placeholder">video placeholder</div>
    </div>
</section>

<div class="divider"></div>

</div> <!-- .page -->

<!-- ========== МОБИЛЬНЫЕ СТИЛИ ========== -->
<style>
    @media (max-width: 900px) {
        .container {
            padding: 40px 16px;
        }
        #parallax-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        #bg-video,
        .overlay,
        .grain {
            display: none;
        }
        .page {
            position: relative;
            z-index: 2;
            min-height: 100%;
        }
        html, body {
            background: #000;
        }
        .reveal {
            opacity: 1;
            transform: none;
            transition: none;
        }
        * {
            animation: none !important;
            transition: none !important;
        }
        .hero {
            min-height: 30vh !important;
        }
        .hero h1 {
            font-size: 42px;
        }
        .section-title {
            font-size: 32px;
            margin-bottom: 25px;
        }
        .gallery {
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .gallery img {
            height: 120px;
        }
    }

    @media (max-width: 600px) {
        .container {
            padding: 80px 16px;
        }
        .header {
            flex-direction: column;
            gap: 20px;
        }
        .nav {
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .nav a {
            font-size: 14px;
            display: block;
            padding: 5px 0;
        }
        .hero h1 {
            font-size: 36px;
            line-height: 1.1;
        }
        .hero p {
            font-size: 16px;
        }
        .hero-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .gallery {
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .gallery img {
            height: 180px;
        }
        .video-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<!-- ДЕСКТОПНЫЕ СКРИПТЫ -->
<script>
if (window.innerWidth > 900) {
    ['js/parallax.js','js/reveal.js','js/sound.js','js/bubbles.js']
        .forEach(src => {
            const s = document.createElement('script');
            s.src = src;
            s.defer = true;
            document.body.appendChild(s);
        });
}
</script>

</body>
</html>
