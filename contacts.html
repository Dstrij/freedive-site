    <!-- Убираем Google Fonts, используем локальные шрифты -->
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet"> -->
    <link rel="stylesheet" href="style.css">

    <!-- ========== ОБЩИЕ СТИЛИ ========== -->
    <style>
        /* Подключаем локальные шрифты */
        @font-face {
            font-family: 'Cormorant Garamond';
            src: url('fonts/CormorantGaramond.ttf') format('truetype');
            font-weight: 500 600;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Inter';
            src: url('fonts/Inter.otf') format('opentype');
            font-weight: 300 400 500 600;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            min-height: 100%;
            touch-action: pan-y pinch-zoom;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif; /* основной шрифт Inter */
            font-size: 16px;
            line-height: 1.5;
            overflow-x: hidden;
            overflow-y: scroll;
        }
        /* Фон (видео / изображение) */
        #parallax-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            transform: translateZ(0);
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            will-change: transform;
        }
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
        }
        .grain {
            position: absolute;
            inset: 0;
            background: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.12;
            pointer-events: none;
        }
        .page {
            position: relative;
            z-index: 2;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 70px 20px;
        }
        .divider {
            height: 1px;
            margin: 20px auto;
        }
        /* Заголовки секций — теперь Cormorant Garamond */
        .section-title {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 44px; /* 40–48px */
            font-weight: 600;
            margin-bottom: 70px;
        }
        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: none;
        }
    </style>
</head>

<!-- ДЕСКТОПНЫЕ СКРИПТЫ -->
<script>
if (window.innerWidth > 900) {
    ['js/parallax.js','js/reveal.js','js/sound.js','js/bubbles.js']
        .forEach(src => {
            const s = document.createElement('script');
            s.src = src;
            s.defer = true;
            document.body.appendChild(s);
        });
}
</script>

<!-- FORMSPREE AJAX -->
<script>
(function () {
    const form = document.getElementById('contactForm');
    const status = document.getElementById('formStatus');
    const button = document.getElementById('submitBtn');

    if (!form || !status || !button) return;

    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const formData = new FormData(form);
        if (formData.get('_gotcha')) return;

        button.disabled = true;
        button.innerText = 'Отправка…';
        button.style.opacity = '0.7';

        try {
            const res = await fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (res.ok) {
                button.innerText = '✓ Отправлено';
                status.style.opacity = '1';

                setTimeout(() => {
                    form.style.transition = 'opacity .6s ease, transform .6s ease';
                    form.style.opacity = '0';
                    form.style.transform = 'translateY(10px)';
                }, 3000);
            }
        } catch (err) {
            button.innerText = 'Ошибка';
            button.disabled = false;
            button.style.opacity = '1';
        }
    });
})();
</script>
